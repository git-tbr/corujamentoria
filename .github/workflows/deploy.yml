name: Deploy Vue.js to github-pages

on:
  push:
    branches:
      - main

# Adicionado para garantir que a Action possa criar/escrever na branch de deploy
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 'npm ci' é mais rápido e seguro para ambientes de CI que o 'install'

      - name: Build Project
        run: npm run build

      - name: Deploy to Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy # Branch onde os arquivos estáticos residirão
          folder: dist # Pasta gerada pelo comando 'npm run build'
          clean: true
